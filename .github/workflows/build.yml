name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches what we use in TDRive: drop --with_rive_canvas (ORE backends),
  # keep text + layout. We don't link ORE.
  RIVE_PREMAKE_ARGS: "--with_rive_text --with_rive_layout"
  # Explicit list of Rive static libs we actually link, used as ninja
  # targets so we don't waste time building path_fiddle etc.
  RIVE_NINJA_TARGETS: "rive rive_pls_renderer rive_decoders rive_harfbuzz rive_sheenbidi rive_yoga libpng libjpeg libwebp zlib miniaudio"

jobs:
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install premake cmake

      - name: Download OBS Studio (for libobs.framework + headers)
        # OBS Studio ships a macOS .dmg containing OBS.app. libobs is bundled
        # inside as a framework, but the exact path and the .app's name have
        # moved between releases - hence the find-based lookup below.
        env:
          OBS_VERSION: "30.2.3"
        run: |
          set -e
          dmg="OBS-Studio-${OBS_VERSION}-macOS-Apple.dmg"
          url="https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/${dmg}"
          curl -fsSL -o "$RUNNER_TEMP/$dmg" "$url"
          mp=$(hdiutil attach -nobrowse -readonly "$RUNNER_TEMP/$dmg" | awk 'END{print $3}')
          echo "Mounted at $mp"
          echo "--- volume contents ---"
          ls "$mp"
          app=$(find "$mp" -maxdepth 2 -name "*.app" -type d | head -n1)
          echo "App bundle: $app"
          echo "--- Contents/Frameworks ---"
          ls "$app/Contents/Frameworks" 2>/dev/null || echo "(no Frameworks dir at top level)"
          # Walk the whole bundle if the framework isn't where it used to be.
          fw=$(find "$app" -type d -name "libobs.framework" | head -n1)
          if [ -z "$fw" ]; then
              echo "--- full bundle layout (depth 4) ---"
              find "$app" -maxdepth 4 -name "libobs*"
              hdiutil detach "$mp" -force || true
              echo "ERROR: libobs.framework not found inside $app" >&2
              exit 1
          fi
          echo "Found libobs.framework at $fw"
          mkdir -p "$RUNNER_TEMP/obs"
          cp -R "$fw" "$RUNNER_TEMP/obs/"
          hdiutil detach "$mp" -force
          ls "$RUNNER_TEMP/obs/libobs.framework/Headers" | head
          echo "OBS_PATH=$RUNNER_TEMP/obs" >> "$GITHUB_ENV"

      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBOBS_PATH="${OBS_PATH}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          (cd build && zip -r ../dist/obs-rive_mac.zip obs-rive.plugin)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_mac
          path: dist/obs-rive_mac.zip

  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install premake5
        shell: pwsh
        run: |
          $version = "5.0.0-beta8"
          $url = "https://github.com/premake/premake-core/releases/download/v$version/premake-$version-windows.zip"
          $dest = "$env:RUNNER_TEMP\premake"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$dest\premake.zip"
          Expand-Archive -Path "$dest\premake.zip" -DestinationPath $dest
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve Rive commit
        id: rive
        shell: bash
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        shell: bash
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        env:
          RIVE_BUILD_SYSTEM: ninja
        run: scripts\build_rive.bat release -- ${{ env.RIVE_NINJA_TARGETS }}

      - name: Download OBS Studio SDK
        shell: pwsh
        # The official Windows release zip is a dev-friendly distribution -
        # it includes obs.dll, obs.lib (the import lib), and headers under
        # include/obs/. The zip extracts with a top-level OBS-Studio/ folder,
        # so we locate obs-module.h after extraction and point LIBOBS_PATH at
        # the dir that holds include/ + bin/.
        run: |
          $obsVersion = "30.2.3"
          $url = "https://github.com/obsproject/obs-studio/releases/download/$obsVersion/OBS-Studio-$obsVersion-Windows.zip"
          $dest = "$env:RUNNER_TEMP\obs"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$dest\obs.zip"
          Expand-Archive -Path "$dest\obs.zip" -DestinationPath $dest -Force
          $hdr = Get-ChildItem -Path $dest -Recurse -Filter "obs-module.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hdr) {
              Write-Host "Extracted tree:"
              Get-ChildItem -Path $dest -Recurse -Depth 3 | ForEach-Object { Write-Host $_.FullName }
              throw "obs-module.h not found anywhere under $dest"
          }
          # $hdr.Directory = .../include/obs   -> grandparent is the SDK root.
          $obsRoot = $hdr.Directory.Parent.Parent.FullName
          Write-Host "Located obs-module.h: $($hdr.FullName)"
          Write-Host "Using OBS_PATH=$obsRoot"
          "OBS_PATH=$obsRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure plugin
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DLIBOBS_PATH="${{ env.OBS_PATH }}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\Release\obs-rive.dll -DestinationPath dist\obs-rive_win.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_win
          path: dist/obs-rive_win.zip

  # ---------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build clang lld \
            libobs-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - name: Install premake5
        run: |
          version="5.0.0-beta8"
          url="https://github.com/premake/premake-core/releases/download/v${version}/premake-${version}-linux.tar.gz"
          dest="$RUNNER_TEMP/premake"
          mkdir -p "$dest"
          curl -fsSL "$url" | tar -xz -C "$dest"
          chmod +x "$dest/premake5"
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/premake5" --version

      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          cp build/obs-rive.so dist/
          (cd dist && tar -czf obs-rive_linux.tar.gz obs-rive.so)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_linux
          path: dist/obs-rive_linux.tar.gz

  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_mac,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_win,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_linux, path: release }
      - run: ls -la release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/obs-rive_mac.zip
            release/obs-rive_win.zip
            release/obs-rive_linux.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
