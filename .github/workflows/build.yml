name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches what we use in TDRive: drop --with_rive_canvas (ORE backends),
  # keep text + layout. We don't link ORE.
  RIVE_PREMAKE_ARGS: "--with_rive_text --with_rive_layout"
  # Explicit list of Rive static libs we actually link, used as ninja
  # targets so we don't waste time building path_fiddle etc.
  RIVE_NINJA_TARGETS: "rive rive_pls_renderer rive_decoders rive_harfbuzz rive_sheenbidi rive_yoga libpng libjpeg libwebp zlib miniaudio"

jobs:
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install premake cmake

      - name: Clone OBS Studio source (for headers)
        # The macOS DMG's libobs.framework is runtime-only - no Headers/.
        # We pull headers from a shallow source clone and graft them onto the
        # framework below so CMake sees a complete one.
        env:
          OBS_VERSION: "30.2.3"
        run: |
          git clone --depth 1 --branch "${OBS_VERSION}" --no-recurse-submodules \
            https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-src"
          [ -f "$RUNNER_TEMP/obs-src/libobs/obs-module.h" ] || {
              echo "ERROR: obs-module.h not in cloned source tree" >&2; exit 1; }

      - name: Download OBS Studio macOS (for libobs.framework binary)
        env:
          OBS_VERSION: "30.2.3"
        run: |
          set -e
          dmg="OBS-Studio-${OBS_VERSION}-macOS-Apple.dmg"
          url="https://github.com/obsproject/obs-studio/releases/download/${OBS_VERSION}/${dmg}"
          curl -fsSL -o "$RUNNER_TEMP/$dmg" "$url"
          mp=$(hdiutil attach -nobrowse -readonly "$RUNNER_TEMP/$dmg" | awk -F'\t' '/\/Volumes\// {print $NF}' | tail -n1)
          if [ -z "$mp" ] || [ ! -d "$mp" ]; then
              echo "ERROR: could not parse mount point from hdiutil attach output" >&2
              exit 1
          fi
          echo "Mounted at \"$mp\""
          app=$(find "$mp" -maxdepth 2 -name "*.app" -type d | head -n1)
          fw=$(find "$app" -type d -name "libobs.framework" | head -n1)
          if [ -z "$fw" ]; then
              echo "--- bundle layout ---"; find "$app" -maxdepth 4 -name "libobs*"
              hdiutil detach "$mp" -force || true
              echo "ERROR: libobs.framework not found inside $app" >&2; exit 1
          fi
          mkdir -p "$RUNNER_TEMP/obs"
          ditto "$fw" "$RUNNER_TEMP/obs/libobs.framework"
          hdiutil detach "$mp" -force

          # The OBS macOS distribution strips Headers from libobs.framework.
          # Graft them in from the cloned source so CMake's framework-style
          # discovery works: Headers -> Versions/Current/Headers -> A/Headers.
          fwOut="$RUNNER_TEMP/obs/libobs.framework"
          verDir=$(find "$fwOut/Versions" -maxdepth 1 -mindepth 1 -type d -not -name Current | head -n1)
          [ -n "$verDir" ] || { echo "ERROR: no Versions/<letter> dir in framework"; exit 1; }
          rm -rf "$verDir/Headers"
          ln -s "$RUNNER_TEMP/obs-src/libobs" "$verDir/Headers"
          [ -L "$fwOut/Headers" ] || ln -s "Versions/Current/Headers" "$fwOut/Headers"

          echo "--- final framework layout ---"
          ls -la "$fwOut"
          ls "$fwOut/Headers" | head
          [ -f "$fwOut/Headers/obs-module.h" ] || {
              echo "ERROR: obs-module.h not resolvable via framework Headers"; exit 1; }
          echo "OBS_PATH=$RUNNER_TEMP/obs" >> "$GITHUB_ENV"

      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBOBS_PATH="${OBS_PATH}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          (cd build && zip -r ../dist/obs-rive_mac.zip obs-rive.plugin)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_mac
          path: dist/obs-rive_mac.zip

  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install premake5
        shell: pwsh
        run: |
          $version = "5.0.0-beta8"
          $url = "https://github.com/premake/premake-core/releases/download/v$version/premake-$version-windows.zip"
          $dest = "$env:RUNNER_TEMP\premake"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$dest\premake.zip"
          Expand-Archive -Path "$dest\premake.zip" -DestinationPath $dest
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve Rive commit
        id: rive
        shell: bash
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        shell: bash
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        env:
          RIVE_BUILD_SYSTEM: ninja
        run: scripts\build_rive.bat release -- ${{ env.RIVE_NINJA_TARGETS }}

      # ---------------------------------------------------------------------
      # OBS doesn't publish a Windows SDK - the Windows release zip is
      # runtime-only. To compile and link our plugin we clone obs-studio at
      # a pinned tag, pull in the matching obs-deps third-party prebuilts,
      # and build just the libobs target. ~15 min cold, ~30 s on cache hit.
      # ---------------------------------------------------------------------
      - name: Restore OBS build cache
        id: obs-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-windows-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1
        env:
          OBS_VERSION: "30.2.3"
          OBS_DEPS_VERSION: "2024-09-12"

      - name: Clone OBS Studio source
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          OBS_VERSION: "30.2.3"
        run: |
          git clone --depth 1 --branch "${OBS_VERSION}" --recursive \
            https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-src"

      - name: Download obs-deps prebuilts
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          OBS_DEPS_VERSION: "2024-09-12"
        run: |
          $url = "https://github.com/obsproject/obs-deps/releases/download/$env:OBS_DEPS_VERSION/windows-deps-$env:OBS_DEPS_VERSION-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\obs-deps.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\obs-deps.zip" -DestinationPath "$env:RUNNER_TEMP\obs-deps" -Force

      - name: Configure + build libobs from source
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S "$env:RUNNER_TEMP\obs-src" -B "$env:RUNNER_TEMP\obs-build" `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP\obs-install" `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP\obs-deps" `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_BROWSER=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_VST=OFF `
            -DENABLE_AJA=OFF `
            -DENABLE_DECKLINK=OFF `
            -DENABLE_VIRTUALCAM=OFF `
            -DENABLE_RTMPS=OFF `
            -DENABLE_WEBSOCKET=OFF
          cmake --build "$env:RUNNER_TEMP\obs-build" --config Release --target libobs --parallel
          # The 'obs_libraries' component drops headers + import lib + DLL.
          # OBS's UI subproject still emits an install rule for
          # obs-frontend-api.dll even with ENABLE_UI=OFF and fails there,
          # AFTER libobs is fully installed - so we tolerate a non-zero exit
          # and verify success by checking that obs-module.h is present.
          $ErrorActionPreference = 'Continue'
          cmake --install "$env:RUNNER_TEMP\obs-build" --config Release --component obs_libraries
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path "$env:RUNNER_TEMP\obs-install\include\obs\obs-module.h")) {
              throw "libobs install incomplete - obs-module.h is missing."
          }
          if (-not (Get-ChildItem -Path "$env:RUNNER_TEMP\obs-install" -Recurse -Filter "obs.lib" -ErrorAction SilentlyContinue)) {
              throw "libobs install incomplete - obs.lib is missing."
          }

      - name: Save OBS build cache
        if: steps.obs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-windows-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1
        env:
          OBS_VERSION: "30.2.3"
          OBS_DEPS_VERSION: "2024-09-12"

      - name: Locate OBS SDK
        shell: pwsh
        run: |
          $sdk = "$env:RUNNER_TEMP\obs-install"
          $hdr = Get-ChildItem -Path $sdk -Recurse -Filter "obs-module.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hdr) {
              Write-Host "Install tree (depth 4):"
              Get-ChildItem -Path $sdk -Recurse -Depth 4 | ForEach-Object { Write-Host $_.FullName }
              throw "obs-module.h not found under $sdk after build+install"
          }
          $obsRoot = $hdr.Directory.Parent.Parent.FullName
          Write-Host "OBS SDK root: $obsRoot"
          "OBS_PATH=$obsRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure plugin
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DLIBOBS_PATH="${{ env.OBS_PATH }}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\Release\obs-rive.dll -DestinationPath dist\obs-rive_win.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_win
          path: dist/obs-rive_win.zip

  # ---------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # llvm: gives us llvm-ar, which Rive's premake config uses to archive
        # static libs on Linux. The clang apt package alone doesn't include it.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build clang lld llvm \
            libobs-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      # The premake5 prebuilt for Linux is built against a newer glibc than
      # ubuntu-22.04 ships, so we don't install it here. Rive's build_rive.sh
      # clones premake-core and bootstraps it from source instead. Adds ~30s
      # to first Rive build; cached after that.

      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          cp build/obs-rive.so dist/
          (cd dist && tar -czf obs-rive_linux.tar.gz obs-rive.so)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_linux
          path: dist/obs-rive_linux.tar.gz

  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_mac,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_win,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_linux, path: release }
      - run: ls -la release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/obs-rive_mac.zip
            release/obs-rive_win.zip
            release/obs-rive_linux.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
