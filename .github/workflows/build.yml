name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ---- OBS SDK ----
  # Pinned OBS Studio version that all three platforms build from source.
  # Bumping either of these invalidates the obs-sdk-* caches automatically
  # via the cache key.
  OBS_VERSION: "30.2.3"
  OBS_DEPS_VERSION: "2024-09-12"

  # ---- Rive runtime ----
  # Drop --with_rive_canvas (ORE backends) - we don't link ORE.
  RIVE_PREMAKE_ARGS: "--with_rive_text --with_rive_layout"
  # Explicit list of Rive static libs we actually link, used as ninja targets
  # on Windows so we don't waste time building path_fiddle etc.
  RIVE_NINJA_TARGETS: "rive rive_pls_renderer rive_decoders rive_harfbuzz rive_sheenbidi rive_yoga libpng libjpeg libwebp zlib miniaudio"

jobs:
  # ===========================================================================
  # macOS arm64
  # ===========================================================================
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        # curl is keg-only on macOS so we have to --force --overwrite link it
        # into Homebrew's standard prefix; otherwise CMake's FindCURL doesn't
        # see it, and OBS's deps/file-updater wipes any -DCURL_LIBRARY override.
        run: |
          brew install premake cmake curl
          brew link --force --overwrite curl
          ls -la "$(brew --prefix)/include/curl" 2>/dev/null | head || true
          ls -la "$(brew --prefix)/lib" | grep -i curl | head || true

      - name: Select newest Xcode on the runner
        # OBS macOS requires the 14.2+ SDK. macos-14 runner images rotate
        # which Xcodes are installed; instead of pinning a version, pick the
        # latest available and verify the SDK is reachable.
        run: |
          set -e
          echo "--- installed Xcodes ---"
          ls -d /Applications/Xcode*.app 2>/dev/null || { echo "no Xcodes in /Applications"; exit 1; }
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$latest" ]; then
              latest=/Applications/Xcode.app
          fi
          echo "Picking: $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcode-select -p
          xcodebuild -version
          sdkVer=$(xcrun --show-sdk-version)
          sdkPath=$(xcrun --show-sdk-path)
          echo "SDK version: $sdkVer"
          echo "SDK path:    $sdkPath"
          # Bail loudly if the SDK is older than what OBS demands.
          maj=$(echo "$sdkVer" | cut -d. -f1)
          min=$(echo "$sdkVer" | cut -d. -f2)
          if [ "$maj" -lt 14 ] || { [ "$maj" -eq 14 ] && [ "$min" -lt 2 ]; }; then
              echo "ERROR: macOS SDK $sdkVer < required 14.2" >&2
              exit 1
          fi
          # Make the choice survive into later steps (some tools read this).
          echo "DEVELOPER_DIR=$latest/Contents/Developer" >> "$GITHUB_ENV"
          echo "SDKROOT=$sdkPath" >> "$GITHUB_ENV"

      # ----- OBS SDK (build libobs from source, cache, upload as artifact) ---
      - name: Restore OBS SDK cache
        id: obs-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-macos-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1

      - name: Clone OBS Studio source
        if: steps.obs-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${OBS_VERSION}" --recursive \
            https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-src"

      - name: Download macOS obs-deps
        if: steps.obs-cache.outputs.cache-hit != 'true'
        run: |
          url="https://github.com/obsproject/obs-deps/releases/download/${OBS_DEPS_VERSION}/macos-deps-${OBS_DEPS_VERSION}-arm64.tar.xz"
          curl -fsSL -o "$RUNNER_TEMP/obs-deps.tar.xz" "$url"
          mkdir -p "$RUNNER_TEMP/obs-deps"
          tar -xJf "$RUNNER_TEMP/obs-deps.tar.xz" -C "$RUNNER_TEMP/obs-deps"
          echo "--- obs-deps top-level layout ---"
          ls "$RUNNER_TEMP/obs-deps"
          # Some obs-deps tarballs wrap their content in an extra directory;
          # flatten it so CMAKE_PREFIX_PATH=$RUNNER_TEMP/obs-deps works.
          if [ ! -d "$RUNNER_TEMP/obs-deps/include" ]; then
              inner=$(find "$RUNNER_TEMP/obs-deps" -maxdepth 2 -name "include" -type d | head -n1)
              if [ -n "$inner" ]; then
                  wrapper="$(dirname "$inner")"
                  echo "Flattening wrapper dir $wrapper"
                  shopt -s dotglob
                  mv "$wrapper"/* "$RUNNER_TEMP/obs-deps/"
                  shopt -u dotglob
              fi
          fi
          echo "--- obs-deps curl-related files ---"
          find "$RUNNER_TEMP/obs-deps" -name "*curl*" -maxdepth 4 2>/dev/null | head -20

      - name: Configure + build libobs
        if: steps.obs-cache.outputs.cache-hit != 'true'
        # OBS macOS CMake guards against non-Xcode generators (see
        # cmake/macos/compilerconfig.cmake) - has to be -G Xcode here.
        # CMAKE_PREFIX_PATH lists obs-deps first, then brew's curl.
        run: |
          # OBS's compilerconfig.cmake captures the SDK version from the
          # tail of CMAKE_OSX_SYSROOT via a regex that requires the path to
          # end in 'MacOSX<X.Y>.sdk'. xcrun --show-sdk-path returns the
          # version-less 'MacOSX.sdk' symlink, which makes the regex match
          # nothing and OBS errors out with "Your macOS SDK version () is
          # too low". So construct the versioned path explicitly.
          SDK_VER=$(xcrun --show-sdk-version)
          SDK_GENERIC=$(xcrun --show-sdk-path)
          SDK_PATH="$(dirname "$SDK_GENERIC")/MacOSX${SDK_VER}.sdk"
          if [ ! -d "$SDK_PATH" ]; then
              echo "ERROR: versioned SDK dir $SDK_PATH not found" >&2
              ls "$(dirname "$SDK_GENERIC")"
              exit 1
          fi
          echo "Using SDK ${SDK_VER} at: $SDK_PATH"
          cmake -S "$RUNNER_TEMP/obs-src" -B "$RUNNER_TEMP/obs-build" \
            -G Xcode \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/obs-install" \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/obs-deps;$(brew --prefix)" \
            -DCMAKE_OSX_SYSROOT="$SDK_PATH" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DENABLE_UI=OFF -DENABLE_SCRIPTING=OFF -DENABLE_BROWSER=OFF \
            -DENABLE_PLUGINS=OFF -DENABLE_VLC=OFF -DENABLE_VST=OFF \
            -DENABLE_AJA=OFF -DENABLE_DECKLINK=OFF -DENABLE_VIRTUALCAM=OFF \
            -DENABLE_RTMPS=OFF -DENABLE_WEBSOCKET=OFF
          cmake --build "$RUNNER_TEMP/obs-build" --config Release --target libobs --parallel

          # cmake --install on macOS errors out on disabled UI/frontend-api
          # targets - same as Windows. Assemble the SDK by hand from the
          # build output + source headers instead.
          sdk="$RUNNER_TEMP/obs-install"
          mkdir -p "$sdk"

          # Locate the built framework. Xcode also emits a stub framework
          # under build/EagerLinkingTBDs/ for incremental link; skip that
          # by only searching the libobs/ target output dir.
          fw=$(find "$RUNNER_TEMP/obs-build/libobs" -type d -name "libobs.framework" \
               -not -path "*/EagerLinkingTBDs/*" | head -n1)
          [ -n "$fw" ] || { echo "ERROR: built libobs.framework not found under libobs/"; \
                             find "$RUNNER_TEMP/obs-build" -type d -name "libobs.framework"; \
                             exit 1; }
          echo "Built framework: $fw"

          # Copy with ditto to preserve Versions/Current symlinks.
          ditto "$fw" "$sdk/libobs.framework"

          # The built framework lacks public headers; symlink them in from
          # the source tree so plugins compile against the same API the
          # framework binary exports.
          fwOut="$sdk/libobs.framework"
          verDir=$(find "$fwOut/Versions" -maxdepth 1 -mindepth 1 -type d -not -name Current | head -n1)
          [ -n "$verDir" ] || { echo "ERROR: no Versions/<letter> dir in framework"; exit 1; }
          rm -rf "$verDir/Headers"
          ln -s "$RUNNER_TEMP/obs-src/libobs" "$verDir/Headers"
          [ -L "$fwOut/Headers" ] || ln -s "Versions/Current/Headers" "$fwOut/Headers"

          # Pick up generated obsconfig.h - it lives in the build tree, not the source.
          cfg=$(find "$RUNNER_TEMP/obs-build" -name "obsconfig.h" | head -n1)
          if [ -n "$cfg" ]; then
              cp "$cfg" "$verDir/Headers/obsconfig.h"
          fi

          [ -f "$fwOut/Headers/obs-module.h" ] || {
              echo "ERROR: obs-module.h not resolvable via framework Headers"; exit 1; }
          echo "--- final SDK layout ---"
          ls -la "$fwOut"
          ls "$fwOut/Headers" | head

      - name: Save OBS SDK cache
        if: steps.obs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-macos-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1

      - name: Export OBS_PATH
        run: echo "OBS_PATH=$RUNNER_TEMP/obs-install" >> "$GITHUB_ENV"

      - name: Upload OBS SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-sdk-macos
          path: ${{ runner.temp }}/obs-install
          retention-days: 30

      # ----- Rive runtime -----
      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      # ----- Plugin -----
      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBOBS_PATH="${OBS_PATH}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-macos-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          (cd build && zip -r ../dist/obs-rive_mac.zip obs-rive.plugin)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_mac
          path: dist/obs-rive_mac.zip

  # ===========================================================================
  # Windows x64
  # ===========================================================================
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install premake5
        shell: pwsh
        run: |
          $version = "5.0.0-beta8"
          $url = "https://github.com/premake/premake-core/releases/download/v$version/premake-$version-windows.zip"
          $dest = "$env:RUNNER_TEMP\premake"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$dest\premake.zip"
          Expand-Archive -Path "$dest\premake.zip" -DestinationPath $dest
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ----- OBS SDK -----
      - name: Restore OBS SDK cache
        id: obs-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-windows-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1

      - name: Clone OBS Studio source
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "${OBS_VERSION}" --recursive \
            https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-src"

      - name: Download windows obs-deps
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-deps/releases/download/$env:OBS_DEPS_VERSION/windows-deps-$env:OBS_DEPS_VERSION-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\obs-deps.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\obs-deps.zip" -DestinationPath "$env:RUNNER_TEMP\obs-deps" -Force

      - name: Configure + build libobs
        if: steps.obs-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S "$env:RUNNER_TEMP\obs-src" -B "$env:RUNNER_TEMP\obs-build" `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:RUNNER_TEMP\obs-install" `
            -DCMAKE_PREFIX_PATH="$env:RUNNER_TEMP\obs-deps" `
            -DENABLE_UI=OFF -DENABLE_SCRIPTING=OFF -DENABLE_BROWSER=OFF `
            -DENABLE_PLUGINS=OFF -DENABLE_VLC=OFF -DENABLE_VST=OFF `
            -DENABLE_AJA=OFF -DENABLE_DECKLINK=OFF -DENABLE_VIRTUALCAM=OFF `
            -DENABLE_RTMPS=OFF -DENABLE_WEBSOCKET=OFF
          cmake --build "$env:RUNNER_TEMP\obs-build" --config Release --target libobs --parallel

          # cmake --install --component obs_libraries on Windows fails
          # because OBS's UI subproject still emits an install rule for
          # obs-frontend-api.dll even with ENABLE_UI=OFF, and the rule errors
          # before libobs's headers are installed. So we assemble the SDK
          # by hand from the source tree + the build outputs we just made.
          $sdk = "$env:RUNNER_TEMP\obs-install"
          $inc = "$sdk\include"
          $bin = "$sdk\bin\64bit"
          New-Item -ItemType Directory -Force -Path $inc, $bin | Out-Null

          # Copy every header from $obs-src/libobs/ preserving subdir layout
          # under $sdk/include/. Matches what 'obs_libraries' would install.
          $srcLib = "$env:RUNNER_TEMP\obs-src\libobs"
          Get-ChildItem -Path $srcLib -Recurse -File `
              | Where-Object { $_.Name -match '\.(h|hpp)$' } `
              | ForEach-Object {
                  $rel = $_.FullName.Substring($srcLib.Length + 1)
                  $dst = Join-Path $inc $rel
                  $dstDir = Split-Path $dst -Parent
                  if (-not (Test-Path $dstDir)) { New-Item -ItemType Directory -Force -Path $dstDir | Out-Null }
                  Copy-Item $_.FullName $dst
              }

          # CMake generates obsconfig.h into the build tree; grab it.
          $cfg = Get-ChildItem -Path "$env:RUNNER_TEMP\obs-build" -Recurse -Filter "obsconfig.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cfg) { Copy-Item $cfg.FullName "$inc\obsconfig.h" }

          # Built import lib + DLL.
          $lib = Get-ChildItem -Path "$env:RUNNER_TEMP\obs-build" -Recurse -Filter "obs.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          $dll = Get-ChildItem -Path "$env:RUNNER_TEMP\obs-build" -Recurse -Filter "obs.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lib) { throw "Could not find built obs.lib under $env:RUNNER_TEMP\obs-build" }
          if (-not $dll) { throw "Could not find built obs.dll under $env:RUNNER_TEMP\obs-build" }
          Copy-Item $lib.FullName "$bin\obs.lib"
          Copy-Item $dll.FullName "$bin\obs.dll"

          # Sanity-check the assembled SDK.
          if (-not (Test-Path "$inc\obs-module.h")) {
              throw "SDK assembly failed - obs-module.h missing under $inc"
          }
          Write-Host "Assembled SDK:"
          Write-Host "  headers:  $inc"
          Write-Host "  libs:     $bin"
          Get-ChildItem $bin

      - name: Save OBS SDK cache
        if: steps.obs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-windows-${{ env.OBS_VERSION }}-${{ env.OBS_DEPS_VERSION }}-v1

      - name: Locate OBS SDK
        shell: pwsh
        run: |
          $hdr = Get-ChildItem -Path "$env:RUNNER_TEMP\obs-install" -Recurse -Filter "obs-module.h" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hdr) { throw "obs-module.h not found under SDK after build+install" }
          $obsRoot = $hdr.Directory.Parent.Parent.FullName
          "OBS_PATH=$obsRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload OBS SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-sdk-windows
          path: ${{ runner.temp }}/obs-install
          retention-days: 30

      # ----- Rive runtime -----
      - name: Resolve Rive commit
        id: rive
        shell: bash
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        shell: bash
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        env:
          RIVE_BUILD_SYSTEM: ninja
        run: scripts\build_rive.bat release -- ${{ env.RIVE_NINJA_TARGETS }}

      # ----- Plugin -----
      - name: Configure plugin
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DLIBOBS_PATH="${{ env.OBS_PATH }}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-windows-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\Release\obs-rive.dll -DestinationPath dist\obs-rive_win.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_win
          path: dist/obs-rive_win.zip

  # ===========================================================================
  # Linux x64
  # ===========================================================================
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        # libcurl: required by OBS's deps/file-updater unconditionally,
        # even with RTMPS/WEBSOCKET disabled.
        # FFmpeg + x264: needed by libobs itself (media-io / encoder-glue).
        # pulse/udev/dbus: misc audio + device monitor build-time deps.
        # llvm: gives us llvm-ar, which Rive's premake uses to archive.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build clang lld llvm \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev \
            libswscale-dev libswresample-dev \
            libx264-dev libpulse-dev libudev-dev libdbus-1-dev \
            libcurl4-openssl-dev \
            libx11-xcb-dev libxcb1-dev libxcb-randr0-dev libxcb-xinerama0-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev libxcb-composite0-dev \
            libxcomposite-dev libxinerama-dev libxrandr-dev libx11-dev \
            libwayland-dev libwayland-client0 libwayland-server0 \
            libxkbcommon-dev wayland-protocols \
            libjansson-dev \
            uthash-dev

      # ----- OBS SDK -----
      - name: Restore OBS SDK cache
        id: obs-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-linux-${{ env.OBS_VERSION }}-v1

      - name: Clone OBS Studio source
        if: steps.obs-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${OBS_VERSION}" --recursive \
            https://github.com/obsproject/obs-studio.git "$RUNNER_TEMP/obs-src"

      - name: Configure + build libobs
        if: steps.obs-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S "$RUNNER_TEMP/obs-src" -B "$RUNNER_TEMP/obs-build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/obs-install" \
            -DENABLE_UI=OFF -DENABLE_SCRIPTING=OFF -DENABLE_BROWSER=OFF \
            -DENABLE_PLUGINS=OFF -DENABLE_VLC=OFF -DENABLE_VST=OFF \
            -DENABLE_AJA=OFF -DENABLE_DECKLINK=OFF -DENABLE_VIRTUALCAM=OFF \
            -DENABLE_RTMPS=OFF -DENABLE_WEBSOCKET=OFF \
            -DENABLE_PIPEWIRE=OFF -DENABLE_ALSA=OFF -DENABLE_JACK=OFF
          cmake --build "$RUNNER_TEMP/obs-build" --target libobs --parallel
          cmake --install "$RUNNER_TEMP/obs-build" --component obs_libraries || true
          find "$RUNNER_TEMP/obs-install" -name "obs-module.h" -print -quit | grep -q . || \
            { echo "obs-module.h missing"; exit 1; }

      - name: Save OBS SDK cache
        if: steps.obs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/obs-install
          key: obs-sdk-linux-${{ env.OBS_VERSION }}-v1

      - name: Export OBS_PATH
        run: echo "OBS_PATH=$RUNNER_TEMP/obs-install" >> "$GITHUB_ENV"

      - name: Upload OBS SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-sdk-linux
          path: ${{ runner.temp }}/obs-install
          retention-days: 30

      # ----- Rive runtime -----
      - name: Resolve Rive commit
        id: rive
        run: |
          RIVE_REF="${RIVE_REF:-main}"
          SHA=$(git ls-remote https://github.com/rive-app/rive-runtime.git "$RIVE_REF" | awk '{print $1}')
          [ -z "$SHA" ] && { echo "Could not resolve $RIVE_REF"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone Rive runtime
        run: |
          mkdir -p third_party
          git clone --recursive https://github.com/rive-app/rive-runtime.git third_party/rive-runtime
          git -C third_party/rive-runtime checkout ${{ steps.rive.outputs.sha }}
          git -C third_party/rive-runtime submodule update --init --recursive

      - name: Restore Rive build cache
        id: rive-cache
        uses: actions/cache/restore@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Build Rive runtime
        if: steps.rive-cache.outputs.cache-hit != 'true'
        run: ./scripts/build_rive.sh release

      # ----- Plugin -----
      - name: Configure plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DLIBOBS_PATH="${OBS_PATH}"

      - name: Build plugin
        run: cmake --build build --config Release --parallel

      - name: Save Rive build cache
        if: steps.rive-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: third_party/rive-runtime/renderer/out
          key: rive-linux-${{ steps.rive.outputs.sha }}-v1

      - name: Package
        run: |
          mkdir -p dist
          cp build/obs-rive.so dist/
          (cd dist && tar -czf obs-rive_linux.tar.gz obs-rive.so)

      - uses: actions/upload-artifact@v4
        with:
          name: obs-rive_linux
          path: dist/obs-rive_linux.tar.gz

  # ===========================================================================
  # Release (tag push only)
  # ===========================================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_mac,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_win,   path: release }
      - uses: actions/download-artifact@v4
        with: { name: obs-rive_linux, path: release }
      - run: ls -la release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/obs-rive_mac.zip
            release/obs-rive_win.zip
            release/obs-rive_linux.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
